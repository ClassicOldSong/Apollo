name: Ubuntu Build

on:
  push:
    branches: [master, main, linux-port]
    tags:
      - "v*"
  pull_request:
    branches: [master, main, linux-port]
  workflow_dispatch:

permissions:
  contents: read

env:
  BUILD_TYPE: Release

jobs:
  ubuntu-deb:
    name: Ubuntu 24.04 deb
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            appstream \
            appstream-util \
            build-essential \
            cmake \
            desktop-file-utils \
            g++ \
            gcc \
            git \
            graphviz \
            libayatana-appindicator3-dev \
            libboost-all-dev \
            libcap-dev \
            libcurl4-openssl-dev \
            libdrm-dev \
            libevdev-dev \
            libgbm-dev \
            libglib2.0-dev \
            libminiupnpc-dev \
            libnotify-dev \
            libnuma-dev \
            libopus-dev \
            libpipewire-0.3-dev \
            libpulse-dev \
            libssl-dev \
            libudev-dev \
            libva-dev \
            libvdpau-dev \
            libwayland-dev \
            libx11-dev \
            libxfixes-dev \
            libxrandr-dev \
            libxtst-dev \
            libxcb-shm0-dev \
            libxcb-xfixes0-dev \
            libxcb1-dev \
            ninja-build \
            nodejs \
            npm \
            wget \
            xvfb

      - name: Configure
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            export BUILD_VERSION="${GITHUB_REF_NAME}"
            export BRANCH="master"
            export TAG="${GITHUB_REF_NAME}"
            export COMMIT="${GITHUB_SHA}"
            export CLONE_URL="https://github.com/${GITHUB_REPOSITORY}.git"
          fi

          cmake -B build -G Ninja -S . \
            -DCMAKE_BUILD_TYPE=${BUILD_TYPE} \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DBUILD_TESTS=ON \
            -DSUNSHINE_ENABLE_WAYLAND=ON \
            -DSUNSHINE_ENABLE_X11=ON \
            -DSUNSHINE_ENABLE_DRM=ON \
            -DSUNSHINE_ENABLE_CUDA=OFF \
            -DFETCHCONTENT_FULLY_DISCONNECTED=OFF

      - name: Build
        run: cmake --build build -j"$(nproc)"

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Package deb
        run: cpack -G DEB --config build/CPackConfig.cmake

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: ApolloUbuntu-deb
          path: build/cpack_artifacts/*.deb
          if-no-files-found: error

  flatpak-manifest:
    name: Flatpak manifest generation
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install manifest dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake git

      - name: Configure Flatpak manifest
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            export BUILD_VERSION="${GITHUB_REF_NAME}"
            export BRANCH="master"
            export TAG="${GITHUB_REF_NAME}"
            export COMMIT="${GITHUB_SHA}"
            export CLONE_URL="https://github.com/${GITHUB_REPOSITORY}.git"
          fi

          cmake -B build-flatpak-manifest -S . \
            -DSUNSHINE_CONFIGURE_ONLY=ON \
            -DSUNSHINE_CONFIGURE_FLATPAK_MAN=ON \
            -DSUNSHINE_BUILD_FLATPAK=ON
          test -f build-flatpak-manifest/io.github.primezx.ApolloUbuntu.yml

      - name: Upload Flatpak manifest
        uses: actions/upload-artifact@v4
        with:
          name: ApolloUbuntu-flatpak-manifest
          path: |
            build-flatpak-manifest/io.github.primezx.ApolloUbuntu.yml
            build-flatpak-manifest/generated-sources.json
            build-flatpak-manifest/package-lock.json
          if-no-files-found: error

  release:
    name: GitHub release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs:
      - ubuntu-deb
      - flatpak-manifest
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Prepare release assets
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME#v}"
          deb_name="ApolloUbuntu-${version}-ubuntu24.04-amd64.deb"
          flatpak_manifest_name="ApolloUbuntu-flatpak-manifest-${version}.tar.gz"

          mkdir -p dist/flatpak-manifest
          cp release-artifacts/ApolloUbuntu-deb/*.deb "dist/${deb_name}"
          cp release-artifacts/ApolloUbuntu-flatpak-manifest/* dist/flatpak-manifest/
          tar -C dist -czf "dist/${flatpak_manifest_name}" flatpak-manifest

          (
            cd dist
            sha256sum "${deb_name}" "${flatpak_manifest_name}" > SHA256SUMS
          )

          cat > release-notes.md <<EOF
          Apollo Ubuntu ${version}

          Standalone Ubuntu-focused Apollo build with the hybrid EVDI + Mutter/PipeWire virtual display backend.

          Assets:
          - ${deb_name}: recommended Ubuntu 24.04+ install package.
          - ${flatpak_manifest_name}: experimental Flatpak manifest inputs for local Flatpak builds.
          - SHA256SUMS: checksums for release assets.

          Notes:
          - The deb package is the recommended install path because EVDI is a host kernel module.
          - Validate GNOME Wayland, PipeWire capture, EVDI, and Moonlight streaming on the target host.
          EOF

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            dist/ApolloUbuntu-*.deb \
            dist/ApolloUbuntu-flatpak-manifest-*.tar.gz \
            dist/SHA256SUMS \
            --repo "${GITHUB_REPOSITORY}" \
            --target "${GITHUB_SHA}" \
            --title "Apollo Ubuntu ${GITHUB_REF_NAME#v}" \
            --notes-file release-notes.md \
            --latest
